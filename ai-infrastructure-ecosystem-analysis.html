<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Stack 2026 - Risk Levels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .layer-card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .layer-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .risk-safe { background-color: #10b981; color: white; }
        .risk-low { background-color: #34d399; color: white; }
        .risk-medium { background-color: #eab308; color: black; }
        .risk-high { background-color: #f97316; color: white; }
        .risk-highest { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="title-font text-6xl font-bold tracking-tighter mb-3 text-white">AI Infrastructure Stack</h1>
            <p class="text-2xl text-zinc-400">Economic Risk Categorization • Mid-2026</p>
            
            <div class="flex justify-center gap-6 mt-8 flex-wrap text-sm">
                <div class="flex items-center gap-2"><div class="w-4 h-4 risk-safe rounded-full"></div><span>Safe</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 risk-low rounded-full"></div><span>Low Risk</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 risk-medium rounded-full"></div><span>Medium Risk</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 risk-high rounded-full"></div><span>High Risk</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 risk-highest rounded-full"></div><span>Highest Risk</span></div>
            </div>
        </div>

        <div class="space-y-8 max-w-4xl mx-auto" id="stack"></div>

        <div id="detail-panel" class="mt-16 hidden bg-zinc-900 border border-zinc-700 rounded-3xl p-10">
            <button onclick="closeDetail()" class="float-right text-3xl text-zinc-400 hover:text-white">✕</button>
            <div id="detail-content" class="prose prose-invert max-w-none"></div>
        </div>
    </div>

    <script>
        const layers = [
            { num:1, name:"1. Energy & Power", risk:"high", riskLabel:"High Risk", colorClass:"risk-high",
              companies:["Utilities","Nuclear Providers","Siemens Energy","Hyperscalers"],
              desc:"Ultimate foundation. Electricity, cooling & grid are major bottlenecks.",
              details:"Hundreds of MW per cluster. Long lead times and regulatory hurdles make this high risk." },
            
            { num:2, name:"2. Semiconductor Equipment", risk:"medium", riskLabel:"Medium Risk", colorClass:"risk-medium",
              companies:["ASML","Applied Materials","Lam Research"],
              desc:"Tools & materials for chip fabrication.",
              details:"Concentrated but steady demand." },
            
            { num:3, name:"3. Chip Manufacturing", risk:"high", riskLabel:"High Risk", colorClass:"risk-high",
              companies:["TSMC","Samsung","Intel"],
              desc:"Foundries that produce the silicon.",
              details:"Heavy Taiwan exposure = major geopolitical risk." },
            
            { num:4, name:"4. Chip Design & Accelerators", risk:"low", riskLabel:"Low Risk", colorClass:"risk-low",
              companies:["NVIDIA","AMD","Google TPU","Amazon Trainium"],
              desc:"GPUs and custom AI chip design.",
              details:"Strong moats and high margins." },
            
            { num:5, name:"5. Infrastructure & Data Centers", risk:"highest", riskLabel:"Highest Risk", colorClass:"risk-highest",
              companies:["Dell","IBM","HPE","Supermicro","Microsoft Azure","Google Cloud","AWS","Meta"],
              desc:"The AI factories (servers, networking, power). <strong>Most economically risky layer.</strong>",
              details:"Massive capex with uncertain ROI, utilization, and payback. This is the core of the current bet." },
            
            { num:6, name:"6. Data Layer", risk:"medium", riskLabel:"Medium Risk", colorClass:"risk-medium",
              companies:["Hyperscalers","Databricks","Scale AI"],
              desc:"High-quality training data.",
              details:"Scarcity and quality issues emerging." },
            
            { num:7, name:"7. Foundation Models", risk:"medium", riskLabel:"Medium Risk", colorClass:"risk-medium",
              companies:["OpenAI","Anthropic","xAI","Google","Meta"],
              desc:"Training frontier models.",
              details:"High burn but growing revenue." },
            
            { num:8, name:"8. Applications & Services", risk:"low", riskLabel:"Low Risk", colorClass:"risk-low",
              companies:["ChatGPT","Claude","Grok","Copilot","Tesla FSD"],
              desc:"End-user AI products.",
              details:"Fastest monetization and lowest capital intensity." }
        ];

        function createStack() {
            const container = document.getElementById('stack');
            container.innerHTML = '';
            
            layers.forEach((layer, index) => {
                const html = `
                    <div onclick="showDetail(${index})" class="layer-card cursor-pointer bg-zinc-900 border border-zinc-700 hover:border-zinc-500 rounded-3xl p-8">
                        <div class="flex items-center gap-6">
                            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center text-4xl font-bold flex-shrink-0">
                                ${layer.num}
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-4">
                                    <h2 class="title-font text-3xl font-semibold">${layer.name}</h2>
                                    <span class="px-6 py-2 text-sm font-semibold rounded-3xl ${layer.colorClass}">${layer.riskLabel}</span>
                                </div>
                                <p class="text-zinc-400 text-[17px]">${layer.desc}</p>
                                <div class="mt-6 flex flex-wrap gap-2">
                                    ${layer.companies.map(c => `<span class="text-sm bg-zinc-800 px-4 py-1.5 rounded-2xl">${c}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function showDetail(index) {
            const layer = layers[index];
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <h2 class="title-font text-4xl font-bold mb-3">${layer.name}</h2>
                <span class="inline-block px-6 py-2 text-sm font-semibold rounded-3xl ${layer.colorClass} mb-8">${layer.riskLabel}</span>
                <p class="text-xl text-zinc-400 mb-8">${layer.desc}</p>
                
                <div class="bg-zinc-950 p-7 rounded-2xl mb-8">
                    <h4 class="font-semibold mb-5 text-zinc-300">Key Companies</h4>
                    <div class="flex flex-wrap gap-3">
                        ${layer.companies.map(c => `<span class="bg-zinc-800 px-6 py-3 rounded-2xl">${c}</span>`).join('')}
                    </div>
                </div>
                <div class="text-zinc-300 leading-relaxed text-[17px]">${layer.details}</div>
            `;
            panel.classList.remove('hidden');
            panel.scrollIntoView({ behavior: "smooth" });
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.add('hidden');
        }

        window.onload = createStack;
    </script>
</body>
</html>
